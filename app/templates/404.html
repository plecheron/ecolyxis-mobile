{% extends "base.html" %}
{% block title %}404 Not Found — Ecolyxis{% endblock %}
{% block body %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem;">
    <a href="/" style="font-size:1.5rem;text-decoration:none;margin-bottom:1.5rem;">🌿 Ecolyxis</a>
    <div style="font-size:4rem;">🔍</div>
    <h1 style="margin:1rem 0;">Page Not Found</h1>
    <p style="color:var(--text-muted,#8b949e);margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <a href="/" class="btn btn-primary">🏠 Go Home</a>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline">💬 My Chats</a>
    </div>
    <div style="margin-top:1rem;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <a href="javascript:history.back()" style="font-size:0.85rem;color:var(--text-muted,#8b949e);text-decoration:none;">← Go Back</a>
        <a href="{{ url_for('contact.index') }}" style="font-size:0.85rem;color:var(--text-muted,#8b949e);text-decoration:none;">✉️ Contact Support</a>
    </div>
</div>
{% endblock %}
