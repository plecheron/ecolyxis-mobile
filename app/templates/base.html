<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2ea44f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ecolyxis">
    <meta name="description" content="Sustainable AI chatbot powered by green energy.">
    <meta property="og:title" content="Ecolyxis — Sustainable AI">
    <meta property="og:description" content="Sustainable AI chatbot powered by green energy.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ecolyxis.co.uk">
    <meta property="og:image" content="https://ecolyxis.co.uk/static/img/icon-512.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ecolyxis — Sustainable AI">
    <meta name="twitter:description" content="Sustainable AI chatbot powered by green energy.">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/icon-192.png') }}">
    <title>{% block title %}Ecolyxis{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
    // Theme persistence — must run before body render to prevent FOUC
    (function() {
        var stored = localStorage.getItem('theme');
        if (!stored) {
            stored = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        if (stored === 'light') document.documentElement.dataset.theme = 'light';
    })();
    function toggleTheme() {
        var html = document.documentElement;
        var current = html.dataset.theme === 'light' ? 'light' : 'dark';
        var next = current === 'light' ? 'dark' : 'light';
        if (next === 'dark') delete html.dataset.theme;
        else html.dataset.theme = 'light';
        localStorage.setItem('theme', next);
    }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/billing.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/purify.min.js') }}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    {% block head %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" onfocus="this.style.cssText='position:absolute;left:8px;top:8px;width:auto;height:auto;padding:8px 16px;background:var(--primary,#2ea44f);color:#fff;border-radius:4px;z-index:9999;'" onblur="this.style.cssText='position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;'">Skip to main content</a>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
    <script>
    // Auto-dismiss flash messages
    document.querySelectorAll('.flash').forEach(el => {
        setTimeout(() => el.remove(), 4000);
    });
    // Register service worker for PWA
    // PWA: service worker + install prompt
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
    // Capture install prompt for custom button
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show install button if available
        const btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = 'inline-flex';
    });
    window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        const btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = 'none';
    });
    window.pwaInstall = function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        }
    };
    </script>
    {% block scripts %}{% endblock %}

    <!-- Theme toggle (#dark-mode) -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme"
            style="position:fixed;bottom:20px;right:20px;z-index:9998;width:40px;height:40px;padding:0;justify-content:center;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.2);">
        <span class="theme-icon-light">🌙</span>
        <span class="theme-icon-dark">☀️</span>
    </button>

    <!-- Toast notification system (#154) -->
    <div class="toast-container" id="toast-container"></div>
    <script>
    function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        if (!container) return;
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.style.animation = 'toastOut 0.25s ease-in forwards';
            setTimeout(function() { toast.remove(); }, 250);
        }, 3500);
    }
    </script>

</body>
</html>
