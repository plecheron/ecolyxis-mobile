name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ tests/ --ignore=E501,W291 --quiet || true

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: ci-test-secret
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          LLM_BASE_URL: http://test-llm.invalid/v1
          HIDREAM_URL: http://test-hidream.invalid
          WAN22_URL: http://test-wan22.invalid
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check migration files
        run: |
          python -c "
          import os, re
          migrations = 'migrations/versions'
          if os.path.isdir(migrations):
              files = sorted(os.listdir(migrations))
              revs = []
              for f in files:
                  if not f.endswith('.py') or f.startswith('_'):
                      continue
                  with open(os.path.join(migrations, f)) as fh:
                      content = fh.read()
                      rev = re.search(r\"revision = ['\\\"]([^'\\\"]+)\", content)
                      down = re.search(r\"down_revision = ['\\\"]([^'\\\"]+)\", content)
                      if rev:
                          revs.append((rev.group(1), down.group(1) if down else None))
              # Check chain is linear
              for i in range(1, len(revs)):
                  if revs[i][1] != revs[i-1][0]:
                      print(f'Chain broken: {revs[i]} does not follow {revs[i-1]}')
                      raise SystemExit(1)
              print(f'Migration chain OK: {len(revs)} revisions')
          else:
              print('No migrations directory found')
          "
